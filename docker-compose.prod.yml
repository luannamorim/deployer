# Production overrides for docker-compose.yml.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Changes from base:
# - No Grafana (use a managed observability stack in production)
# - Redis not exposed to host
# - Resource limits on all services
# - Production environment variables
services:
  app:
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WORKERS=${WORKERS:-2}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  redis:
    ports: []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M

  prometheus:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M

  grafana:
    profiles:
      - observability
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
